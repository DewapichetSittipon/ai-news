name: Refresh & Deploy

on:
  schedule:
    - cron: "*/30 * * * *" # every 30 min (GitHub may delay/skip high-frequency schedules)
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write # commit refreshed Snapshot + translation cache
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Scrape all sources into the static Snapshot. Thai is translated on-device
      # in the visitor's browser at runtime, so there is no translation step here.
      - name: Refresh data
        run: npm run scrape

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data
          git diff --staged --quiet || git commit -m "chore: refresh news snapshot [skip ci]"
          git push

      - run: npm run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deploy
        uses: actions/deploy-pages@v4
